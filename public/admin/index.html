<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摩托车题库 - 管理后台</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- 左侧菜单 -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🏍️</span>
                <span class="logo-text">题库管理</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>控制台</span>
                </a>
                <a href="#" class="nav-item" data-page="questions">
                    <span class="nav-icon">📝</span>
                    <span>题库管理</span>
                </a>
                <a href="#" class="nav-item" data-page="chapters">
                    <span class="nav-icon">📚</span>
                    <span>章节管理</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <span class="nav-icon">👥</span>
                    <span>用户管理</span>
                </a>
                <a href="#" class="nav-item" data-page="coaches">
                    <span class="nav-icon">👨‍🏫</span>
                    <span>教练管理</span>
                </a>
                <a href="#" class="nav-item" data-page="activations">
                    <span class="nav-icon">🎫</span>
                    <span>激活记录</span>
                </a>
                <a href="#" class="nav-item" data-page="statistics">
                    <span class="nav-icon">📈</span>
                    <span>数据统计</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span>系统设置</span>
                </a>
            </nav>
        </aside>

        <!-- 右侧内容 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="topbar">
                <div class="breadcrumb">
                    <span id="pageTitle">控制台</span>
                </div>
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <button class="btn-logout" onclick="Admin.logout()">退出</button>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content" id="contentArea">
                <!-- 动态加载内容 -->
            </div>
        </main>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="modal-close" onclick="Admin.closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastText"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
